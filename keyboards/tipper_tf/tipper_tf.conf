# Tipper TF - Production Configuration
#
# Build with:
# west build -s zmk/app -b tipper_tf -- -DZMK_CONFIG=/path/to/keyboards/tipper_tf
#
# Debug Logging: To re-enable debug logs, set:
#   CONFIG_DISPLAY_LOG_LEVEL_DBG=y
#   CONFIG_ZMK_LOG_LEVEL_DBG=y
#
# USB Logging: To enable USB logging for debugging, set:
#   CONFIG_ZMK_USB_LOGGING=y
#   And update device tree to use usb_logging_uart instead of studio_rpc_usb_uart

# ZMK Studio enabled (requires studio_rpc_usb_uart in device tree)
CONFIG_ZMK_STUDIO=y

# Ensure core transports stay enabled
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# USB Logging disabled (incompatible with Studio)
CONFIG_ZMK_USB_LOGGING=n

# Keep BLE bonds across power cycles (required for reconnection after sleep/days)
CONFIG_ZMK_BLE_CLEAR_BONDS_ON_START=n

# macOS/connection stability (disables 2M PHY, helps "stale bond" after long idle)
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Stronger BLE signal for reliable reconnection
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Deep sleep: after 15 min idle, clean power-off. Wake = full boot = clean BLE state.
# Avoids BLE stack staying in confused state for days.
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# UF2 Bootloader Support
CONFIG_BUILD_OUTPUT_UF2=y

# Critical boot settings (required for nrf52840)
CONFIG_ARM_MPU=y
CONFIG_PINCTRL=y
CONFIG_GPIO=y
CONFIG_USE_DT_CODE_PARTITION=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

# Flash and storage settings
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y

# Enable Double-Tap Bootloader - automatically clears retention memory on boot
# This prevents the keyboard from getting stuck in bootloader mode
# NOTE: If keyboard is stuck in bootloader mode, temporarily set this to 'n',
#       rebuild, flash, then re-enable. This allows firmware to boot and clear GPREGRET1.
# TEMPORARILY DISABLED: Set to 'n' to allow firmware to boot and clear GPREGRET1
# After flashing and confirming it works, set back to 'y'
CONFIG_ZMK_DBL_TAP_BOOTLOADER=n
# CONFIG_ZMK_DBL_TAP_BOOTLOADER_TIMEOUT_MS=500  # Only valid when DBL_TAP_BOOTLOADER is enabled

# Display Configuration
CONFIG_ZMK_DISPLAY=y
CONFIG_CUSTOM_WIDGET_BATTERY_STATUS=y

# Critical: the `gooddisplay,jd79653` EPD driver only supports 1bpp (PIXEL_FORMAT_MONO10).
# If LVGL is built with higher color depth, nothing will render (white screen).
CONFIG_LV_Z_BITS_PER_PIXEL=1
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_USE_THEME_MONO=y
CONFIG_LV_USE_IMAGE=y

# LVGL draw buffer size is range-limited by Kconfig (1..100)
CONFIG_LV_Z_VDB_SIZE=100
CONFIG_LV_DPI_DEF=184

# LVGL memory pool for custom status screen with images (like corneish_zen)
CONFIG_LV_Z_MEM_POOL_SIZE=8192

# Note: Extended Draw options (LV_COLOR_SCREEN_TRANSP, LV_DRAW_TRANSFORM_USE_MATRIX) 
# are not available as Kconfig options in this ZMK/LVGL version.
# Testing transform_angle without them - may require alternative approach if it fails.

# Reduce impact on time-sensitive subsystems (USB enumeration, BLE, Studio RPC):
# - run display work on its own queue
# - lower its priority (higher number = lower priority in Zephyr)
# - slow the tick: EPDs do not need 10ms UI ticks
CONFIG_ZMK_DISPLAY_WORK_QUEUE_DEDICATED=y
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_STACK_SIZE=4096
CONFIG_ZMK_DISPLAY_DEDICATED_THREAD_PRIORITY=10

# EPD: keep the LVGL loop reasonably frequent so the first frame renders quickly.
# We *only* update the on-screen labels when events happen, so this should not cause
# constant EPD refresh by itself.
CONFIG_ZMK_DISPLAY_TICK_PERIOD_MS=50

# Don't blank while debugging; we want the screen to update when keys are pressed.
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

# Display driver logging - set to DBG for debugging, INF for production
# To re-enable debug logs, uncomment these lines:
# CONFIG_DISPLAY_LOG_LEVEL_DBG=y
# CONFIG_ZMK_LOG_LEVEL_DBG=y
# Default log levels (INF) are used when not explicitly set
# Note: By not setting these, default INF level is used automatically

# SPI support for display
CONFIG_SPI=y

# Heap memory for display driver (needed for clearing display buffer)
# JD79653 uses static buffers, but heap may be needed for other operations
CONFIG_HEAP_MEM_POOL_SIZE=1024